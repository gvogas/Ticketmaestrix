name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: List cPanel Git Repositories (debug)
        run: |
          echo "=== Registered Git Repositories ==="
          curl -sk \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControl/retrieve" \
            | python3 -m json.tool || echo "(could not parse JSON)"
          echo "==================================="

      - name: Trigger cPanel Git Deploy via API Token
        run: |
          RESPONSE=$(curl -sk \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControl/update" \
            --data-urlencode "repository_root=/home/${{ secrets.CPANEL_USER }}/repositories/Ticketmaestrix")

          echo "=== cPanel API Response ==="
          echo "$RESPONSE"
          echo "==========================="

          if echo "$RESPONSE" | python3 -c "import sys, json; json.load(sys.stdin)" 2>/dev/null; then
            STATUS=$(echo "$RESPONSE" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('status', 0))")
            if [ "$STATUS" != "1" ]; then
              echo "Deploy failed — cPanel returned status=0"
              exit 1
            fi
            echo "Deploy succeeded."
          else
            echo "cPanel did not return JSON — check credentials and host above."
            exit 1
          fi
