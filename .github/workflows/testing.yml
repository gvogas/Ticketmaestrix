name: Database Check

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Deploy to cPanel
    types:
      - completed

jobs:
  check:
    name: Check site is up after deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Wait for server to settle
        run: sleep 15

      - name: Check site responds (HTTP health check)
        run: |
          echo "Checking https://${{ secrets.CPANEL_HOST }} ..."

          HTTP_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://${{ secrets.CPANEL_HOST }}/")

          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Site is up and returning 200 OK."
          elif [ "$HTTP_STATUS" = "503" ]; then
            echo "Site returned 503 — maintenance mode may be active."
            exit 1
          elif [ "$HTTP_STATUS" = "500" ]; then
            echo "Site returned 500 — check PHP error log on the server."
            exit 1
          else
            echo "Unexpected status $HTTP_STATUS — check the site."
            exit 1
          fi
