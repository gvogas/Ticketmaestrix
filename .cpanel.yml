---
deployment:
  tasks:
    # Pull latest changes (cPanel Git deployment)
    - cd $HOME/public_html && git pull

    # Install composer dependencies for production
    - cd $HOME/public_html && php /usr/local/bin/composer install --no-dev --optimize-autoloader

    # Set proper directory permissions
    - chmod 755 $HOME/public_html

    # Set proper file permissions
    - find $HOME/public_html -not -path "$HOME/public_html/var*" -type f -exec chmod 644 {} \;

    # Set proper directory permissions (excluding var)
    - find $HOME/public_html -not -path "$HOME/public_html/var*" -type d -exec chmod 755 {} \;

    # Create var directory with restricted permissions
    - mkdir -p $HOME/public_html/var && chmod 700 $HOME/public_html/var
