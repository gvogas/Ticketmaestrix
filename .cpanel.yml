---
deployment:
  tasks:
    - /usr/bin/rsync -av --delete --exclude='.git/' --exclude='.github/' --exclude='.gitignore' --exclude='.gitattributes' --exclude='.cpanel.yml' --exclude='.env' --exclude='.env.*' --exclude='node_modules/' --exclude='package.json' --exclude='package-lock.json' --exclude='update.bat' --exclude='README.md' --exclude='LICENSE' --exclude='.well-known/' --exclude='var/' --exclude='database/' --exclude='.htaccess' --exclude='uploads/' --exclude='vendor/' ./ $HOME/public_html/
    - chmod 755 $HOME/public_html
    - find $HOME/public_html -not -path "$HOME/public_html/var*" -type f -exec chmod 644 {} \;
    - find $HOME/public_html -not -path "$HOME/public_html/var*" -type d -exec chmod 755 {} \;
    - mkdir -p $HOME/public_html/var && chmod 700 $HOME/public_html/var
